name: Release

on:
  push:
    branches:
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build - ${{ matrix.settings.os }} - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust
        if: matrix.settings.target != 'x86_64-unknown-linux-gnu'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Cargo
        if: matrix.settings.target != 'x86_64-unknown-linux-gnu'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Native Binding (Linux - Docker for GLIBC compatibility)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: |
          docker run --rm \
            -v $(pwd):/build \
            -w /build/crates/morphcss_node \
            ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian \
            bash -c "npm install && node_modules/.bin/napi build --platform --release --target x86_64-unknown-linux-gnu"

      - name: Build Native Binding (macOS / Windows)
        if: matrix.settings.target != 'x86_64-unknown-linux-gnu'
        run: npm run build -- --target ${{ matrix.settings.target }}
        working-directory: crates/morphcss_node

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/morphcss_node/*.node
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build and Publish Native Platform Packages
        shell: bash
        run: |
          VERSION=$(node -p "require('./crates/morphcss_node/package.json').version")
          PKG_NAME="@morph-css/node"
          echo "Publishing native packages for $PKG_NAME@$VERSION"

          declare -A PLATFORMS
          PLATFORMS["x86_64-unknown-linux-gnu"]="linux-x64-gnu"
          PLATFORMS["aarch64-apple-darwin"]="darwin-arm64"
          PLATFORMS["x86_64-apple-darwin"]="darwin-x64"
          PLATFORMS["x86_64-pc-windows-msvc"]="win32-x64-msvc"

          declare -A OS_MAP
          OS_MAP["linux-x64-gnu"]="linux"
          OS_MAP["darwin-arm64"]="darwin"
          OS_MAP["darwin-x64"]="darwin"
          OS_MAP["win32-x64-msvc"]="win32"

          declare -A CPU_MAP
          CPU_MAP["linux-x64-gnu"]="x64"
          CPU_MAP["darwin-arm64"]="arm64"
          CPU_MAP["darwin-x64"]="x64"
          CPU_MAP["win32-x64-msvc"]="x64"

          OPTIONAL_DEPS=""

          for TRIPLE in "${!PLATFORMS[@]}"; do
            PLATFORM="${PLATFORMS[$TRIPLE]}"
            SUB_PKG="$PKG_NAME-$PLATFORM"
            SUB_DIR="crates/morphcss_node/npm/$PLATFORM"
            BINARY="morphcss-node.$PLATFORM.node"
            ARTIFACT_FILE="artifacts/bindings-$TRIPLE/$BINARY"

            if [ ! -f "$ARTIFACT_FILE" ]; then
              echo "WARNING: Artifact not found: $ARTIFACT_FILE, skipping."
              continue
            fi

            mkdir -p "$SUB_DIR"
            cp "$ARTIFACT_FILE" "$SUB_DIR/$BINARY"

            cat > "$SUB_DIR/package.json" <<EOF
          {
            "name": "$SUB_PKG",
            "version": "$VERSION",
            "description": "Native binary for $PKG_NAME on ${OS_MAP[$PLATFORM]} ${CPU_MAP[$PLATFORM]}",
            "os": ["${OS_MAP[$PLATFORM]}"],
            "cpu": ["${CPU_MAP[$PLATFORM]}"],
            "main": "$BINARY",
            "files": ["$BINARY"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/CodeReb00t/morphcss.git"
            }
          }
          EOF

            echo "Publishing $SUB_PKG..."
            publish_output=$(npm publish "$SUB_DIR" --access public 2>&1)
            publish_exit=$?
            echo "$publish_output"
            if [ $publish_exit -eq 0 ]; then
              echo "✅ Successfully published $SUB_PKG@$VERSION"
            elif echo "$publish_output" | grep -qiE "cannot publish over|already_exists|E409"; then
              echo "⏭️  $SUB_PKG@$VERSION already on npm, skipping."
            else
              echo "❌ ERROR: Failed to publish $SUB_PKG"
              exit 1
            fi
            OPTIONAL_DEPS="$OPTIONAL_DEPS\"$SUB_PKG\": \"$VERSION\","
          done

          echo "All platform packages processed."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Inject optionalDependencies into @morph-css/node
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./crates/morphcss_node/package.json', 'utf8'));
            const v = pkg.version;
            pkg.optionalDependencies = {
              '@morph-css/node-linux-x64-gnu': v,
              '@morph-css/node-darwin-arm64': v,
              '@morph-css/node-darwin-x64': v,
              '@morph-css/node-win32-x64-msvc': v,
            };
            fs.writeFileSync('./crates/morphcss_node/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('optionalDependencies set to version', v);
          "

      - name: Publish @morph-css/node
        run: |
          VERSION=$(node -p "require('./crates/morphcss_node/package.json').version")
          echo "Publishing @morph-css/node@$VERSION..."
          if npm publish crates/morphcss_node --access public; then
            echo "✅ Successfully published @morph-css/node@$VERSION"
          else
            if npm view "@morph-css/node@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
              echo "⏭️  @morph-css/node@$VERSION already on npm, skipping."
            else
              echo "❌ ERROR: Failed to publish @morph-css/node"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build JS Packages
        run: npm run build -w @morph-css/kit

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}


